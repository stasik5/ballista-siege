<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Ballista Siege</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #2c1810;
  overflow: hidden;
  touch-action: none;
  font-family: 'Georgia', serif;
  user-select: none;
  -webkit-user-select: none;
}
canvas { display: block; }
#ui {
  position: absolute; top: 0; left: 0; width: 100%; pointer-events: none;
  display: flex; justify-content: space-between; padding: 10px 15px;
}
#score { color: #f4e4c1; font-size: 18px; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
#shots { color: #f4e4c1; font-size: 18px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
#level-info { color: #f4e4c1; font-size: 16px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
#overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.75);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 10; pointer-events: all;
}
#overlay.hidden { display: none; }
#overlay h1 { color: #e8a838; font-size: 32px; margin-bottom: 8px; }
#overlay .stars { font-size: 40px; margin-bottom: 10px; }
#overlay h2 { color: #f4e4c1; font-size: 20px; margin-bottom: 10px; }
#overlay p { color: #ccc; font-size: 14px; margin-bottom: 20px; text-align: center; padding: 0 30px; }
.btn {
  background: #8b4513; color: #f4e4c1; border: 2px solid #e8a838;
  padding: 12px 36px; font-size: 17px; border-radius: 8px;
  cursor: pointer; font-weight: bold; font-family: 'Georgia', serif;
}
.btn:active { transform: scale(0.95); background: #a0522d; }
#instructions {
  position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.5); font-size: 13px; pointer-events: none;
  text-align: center; white-space: nowrap;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <div id="score">Score: 0</div>
  <div id="level-info">Level 1</div>
  <div id="shots">🏹 5</div>
</div>
<div id="overlay" class="hidden">
  <h1 id="overlay-title">⚔️ Victory!</h1>
  <div class="stars" id="result-stars"></div>
  <h2 id="result-text"></h2>
  <p id="result-detail"></p>
  <button class="btn" id="actionBtn">Next Level</button>
</div>
<div id="instructions">Drag from ballista to aim & fire</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const shotsEl = document.getElementById('shots');
const levelEl = document.getElementById('level-info');
const overlay = document.getElementById('overlay');
const actionBtn = document.getElementById('actionBtn');
const instrEl = document.getElementById('instructions');

let W, H, GROUND_Y;
let score = 0, shotsLeft = 5, level = 1;
let bodies = [];
let particles = [];
let projectile = null;
let fired = false;
let settleTimer = 0;
let levelDone = false, levelWon = false;
let aiming = false, aimX = 0, aimY = 0;
let stars = 0;
let graceFrames = 0; // no damage during settling

const GRAVITY = 0.4;
const DAMPING = 0.98;
const FRICTION = 0.7;
const BOUNCE = 0.3;

// Ballista position
let BL_X, BL_Y;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  GROUND_Y = H - 60;
  BL_X = Math.min(90, W * 0.12);
  BL_Y = GROUND_Y - 10;
}

// Simple physics body
function makeRect(x, y, w, h, mat) {
  const density = mat === 'stone' ? 3 : (mat === 'wood' ? 1.5 : 0.8);
  return {
    type: 'rect', x, y, w, h, mat,
    vx: 0, vy: 0, angle: 0, va: 0,
    mass: w * h * density * 0.001,
    hp: mat === 'stone' ? 4 : (mat === 'wood' ? 2 : 1),
    maxHp: mat === 'stone' ? 4 : (mat === 'wood' ? 2 : 1),
    alive: true, settled: false
  };
}

function makeCircle(x, y, r, isEnemy) {
  return {
    type: 'circle', x, y, r, isEnemy,
    vx: 0, vy: 0, angle: 0, va: 0,
    mass: r * r * 0.001,
    hp: isEnemy ? 1 : 999,
    alive: true, settled: false
  };
}

function makeProjectile(x, y) {
  return {
    type: 'projectile', x, y, r: 13,
    vx: 0, vy: 0,
    mass: 0.01,
    alive: true, fired: false
  };
}

// AABB collision for rects
function rectAABB(b) {
  return {
    left: b.x - b.w/2, right: b.x + b.w/2,
    top: b.y - b.h/2, bottom: b.y + b.h/2
  };
}

function resolveRectCircle(rect, circ) {
  const a = rectAABB(rect);
  const cx = Math.max(a.left, Math.min(circ.x, a.right));
  const cy = Math.max(a.top, Math.min(circ.y, a.bottom));
  const dx = circ.x - cx;
  const dy = circ.y - cy;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist < circ.r && dist > 0) {
    const overlap = circ.r - dist;
    const nx = dx / dist;
    const ny = dy / dist;
    return { nx, ny, overlap, dist };
  }
  return null;
}

function resolveRectRect(a, b) {
  const aa = rectAABB(a);
  const ab = rectAABB(b);
  const ox = Math.min(aa.right - ab.left, ab.right - aa.left);
  const oy = Math.min(aa.bottom - ab.top, ab.bottom - aa.top);
  if (ox > 0 && oy > 0) {
    if (ox < oy) {
      const nx = (a.x < b.x) ? -1 : 1;
      return { nx, ny: 0, overlap: ox };
    } else {
      const ny = (a.y < b.y) ? -1 : 1;
      return { nx: 0, ny, overlap: oy };
    }
  }
  return null;
}

function resolveCircleCircle(a, b) {
  const dx = b.x - a.x;
  const dy = b.y - a.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const minDist = a.r + b.r;
  if (dist < minDist && dist > 0) {
    const overlap = minDist - dist;
    return { nx: dx/dist, ny: dy/dist, overlap };
  }
  return null;
}

function applyImpulse(a, b, nx, ny, speed) {
  const totalMass = a.mass + b.mass;
  const aFactor = b.mass / totalMass;
  const bFactor = a.mass / totalMass;
  a.vx -= nx * speed * aFactor * (1 + BOUNCE);
  a.vy -= ny * speed * aFactor * (1 + BOUNCE);
  b.vx += nx * speed * bFactor * (1 + BOUNCE);
  b.vy += ny * speed * bFactor * (1 + BOUNCE);
  a.settled = false;
  b.settled = false;
}

function physicsStep() {
  // Gravity
  for (const b of bodies) {
    if (!b.alive || b === projectile && !projectile.fired) continue;
    b.vy += GRAVITY;
    b.vx *= DAMPING;
    b.vy *= DAMPING;
    b.va *= 0.95;
    b.x += b.vx;
    b.y += b.vy;
    b.angle += b.va;
  }

  // Collisions
  for (let i = 0; i < bodies.length; i++) {
    const a = bodies[i];
    if (!a.alive) continue;

    // Ground
    let bottom = a.y + (a.r || a.h/2);
    if (bottom > GROUND_Y) {
      const penetration = bottom - GROUND_Y;
      a.y -= penetration;
      if (Math.abs(a.vy) > 2 && graceFrames <= 0) {
        a.hp = (a.hp || 1) - Math.floor(Math.abs(a.vy) / 6);
        if (a.hp <= 0 && a.type !== 'projectile') destroyBody(a);
      }
      a.vy *= -BOUNCE;
      a.vx *= FRICTION;
      a.va *= 0.8;
    }

    // Walls
    let left = a.x - (a.r || a.w/2);
    let right = a.x + (a.r || a.w/2);
    if (left < 0) { a.x = a.r || a.w/2; a.vx *= -BOUNCE; }
    if (right > W) { a.x = W - (a.r || a.w/2); a.vx *= -BOUNCE; }

    // Body-body
    for (let j = i + 1; j < bodies.length; j++) {
      const b = bodies[j];
      if (!b.alive) continue;

      let col = null;
      if (a.type === 'circle' || a.type === 'projectile') {
        if (b.type === 'rect') col = resolveRectCircle(b, a);
        else col = resolveCircleCircle(a, b);
      } else if (a.type === 'rect') {
        if (b.type === 'rect') col = resolveRectRect(a, b);
        else col = resolveRectCircle(a, b);
      }

      if (col) {
        // Separate
        const sep = col.overlap / 2;
        a.x -= col.nx * sep;
        a.y -= col.ny * sep;
        b.x += col.nx * sep;
        b.y += col.ny * sep;

        // Impulse
        const relVx = a.vx - b.vx;
        const relVy = a.vy - b.vy;
        const relSpeed = Math.sqrt(relVx * relVx + relVy * relVy);
        applyImpulse(a, b, col.nx, col.ny, relSpeed * 0.5);

        // Damage (no damage during grace period)
        if (relSpeed > 3 && graceFrames <= 0) {
          const dmg = relSpeed > 8 ? 3 : (relSpeed > 5 ? 2 : 1);
          if (a.type !== 'projectile' && a !== b) {
            a.hp -= dmg;
            if (a.hp <= 0) destroyBody(a);
          }
          if (b.type !== 'projectile') {
            b.hp -= dmg;
            if (b.hp <= 0) destroyBody(b);
          }
        }
      }
    }
  }

  // Cleanup off-screen projectiles
  if (projectile && projectile.fired) {
    if (projectile.y > H + 100 || projectile.x < -100 || projectile.x > W + 100) {
      projectile.alive = false;
    }
  }
}

function destroyBody(b) {
  if (!b.alive) return;
  b.alive = false;
  const color = b.mat === 'stone' ? '#808080' : (b.mat === 'wood' ? '#8B6914' : (b.isEnemy ? '#cc3333' : '#87CEEB'));
  for (let i = 0; i < 6; i++) {
    particles.push({
      x: b.x, y: b.y,
      vx: (Math.random() - 0.5) * 8,
      vy: -Math.random() * 6 - 2,
      size: 3 + Math.random() * 5,
      color, life: 1.0,
      rot: Math.random() * 6
    });
  }
  if (b.isEnemy) { score += 200; updateUI(); }
  else { score += 50; updateUI(); }
}

function allSettled() {
  for (const b of bodies) {
    if (!b.alive || (b.type === 'projectile' && !b.fired)) continue;
    if (Math.abs(b.vx) > 0.3 || Math.abs(b.vy) > 0.3) return false;
  }
  return true;
}

// Levels
function loadLevel(n) {
  bodies = [];
  particles = [];
  projectile = null;
  fired = false;
  settleTimer = 0;
  levelDone = false;
  levelWon = false;

  const bx = W * 0.62;

  if (n === 1) {
    shotsLeft = 5;
    bodies.push(makeRect(bx, GROUND_Y - 25, 90, 50, 'wood'));
    bodies.push(makeRect(bx - 25, GROUND_Y - 70, 22, 40, 'wood'));
    bodies.push(makeRect(bx + 25, GROUND_Y - 70, 22, 40, 'wood'));
    bodies.push(makeRect(bx, GROUND_Y - 100, 90, 20, 'wood'));
    bodies.push(makeCircle(bx, GROUND_Y - 120, 16, true));
  } else if (n === 2) {
    shotsLeft = 5;
    bodies.push(makeRect(bx - 45, GROUND_Y - 25, 22, 50, 'stone'));
    bodies.push(makeRect(bx + 45, GROUND_Y - 25, 22, 50, 'stone'));
    bodies.push(makeRect(bx, GROUND_Y - 60, 130, 20, 'wood'));
    bodies.push(makeRect(bx - 25, GROUND_Y - 90, 22, 40, 'wood'));
    bodies.push(makeRect(bx + 25, GROUND_Y - 90, 22, 40, 'wood'));
    bodies.push(makeRect(bx, GROUND_Y - 120, 90, 20, 'wood'));
    bodies.push(makeCircle(bx - 20, GROUND_Y - 140, 16, true));
    bodies.push(makeCircle(bx + 20, GROUND_Y - 140, 16, true));
  } else if (n === 3) {
    shotsLeft = 6;
    bodies.push(makeRect(bx, GROUND_Y - 25, 180, 50, 'stone'));
    bodies.push(makeRect(bx - 65, GROUND_Y - 65, 22, 60, 'stone'));
    bodies.push(makeRect(bx - 25, GROUND_Y - 65, 22, 60, 'wood'));
    bodies.push(makeRect(bx + 25, GROUND_Y - 65, 22, 60, 'wood'));
    bodies.push(makeRect(bx + 65, GROUND_Y - 65, 22, 60, 'stone'));
    bodies.push(makeRect(bx, GROUND_Y - 100, 180, 20, 'stone'));
    bodies.push(makeRect(bx - 35, GROUND_Y - 130, 22, 40, 'glass'));
    bodies.push(makeRect(bx + 35, GROUND_Y - 130, 22, 40, 'glass'));
    bodies.push(makeRect(bx, GROUND_Y - 160, 100, 20, 'wood'));
    bodies.push(makeCircle(bx - 20, GROUND_Y - 180, 16, true));
    bodies.push(makeCircle(bx + 20, GROUND_Y - 180, 16, true));
    bodies.push(makeCircle(bx, GROUND_Y - 55, 16, true));
  } else if (n === 4) {
    shotsLeft = 7;
    for (let row = 0; row < 4; row++) {
      const count = 5 - row;
      const sx = bx - (count - 1) * 24;
      const y = GROUND_Y - 25 - row * 45;
      const mat = row < 2 ? 'stone' : (row === 2 ? 'wood' : 'glass');
      for (let i = 0; i < count; i++) {
        bodies.push(makeRect(sx + i * 48, y, 44, 40, mat));
      }
    }
    bodies.push(makeCircle(bx, GROUND_Y - 210, 16, true));
    bodies.push(makeCircle(bx - 48, GROUND_Y - 165, 16, true));
    bodies.push(makeCircle(bx + 48, GROUND_Y - 165, 16, true));
  } else {
    shotsLeft = 8;
    const bh = 3 + Math.floor(Math.random() * 3);
    const cols = 3 + Math.floor(Math.random() * 2);
    for (let row = 0; row < bh; row++) {
      const count = cols + (bh - row - 1);
      const sx = bx - (count - 1) * 24;
      const y = GROUND_Y - 25 - row * 45;
      const mat = ['wood','stone','glass'][Math.floor(Math.random()*3)];
      for (let i = 0; i < count; i++) {
        bodies.push(makeRect(sx + i * 48, y, 44, 40, mat));
      }
    }
    const ec = 2 + Math.floor(Math.random() * 3);
    for (let i = 0; i < ec; i++) {
      bodies.push(makeCircle(bx - 30 + i * 30, GROUND_Y - 40 - bh * 45, 16, true));
    }
  }

  projectile = makeProjectile(BL_X + 45, BL_Y - 25);
  bodies.push(projectile);
  graceFrames = 90; // 1.5s grace period
  updateUI();
}

function updateUI() {
  scoreEl.textContent = `Score: ${score}`;
  shotsEl.textContent = `🏹 ${shotsLeft}`;
  levelEl.textContent = `Level ${level}`;
}

function fire(power, angle) {
  if (fired || !projectile || !projectile.alive) return;
  fired = true;
  shotsLeft--;
  projectile.fired = true;
  projectile.vx = Math.cos(angle) * power;
  projectile.vy = Math.sin(angle) * power;
  updateUI();
}

function nextShot() {
  if (shotsLeft <= 0) { checkEnd(); return; }
  fired = false;
  settleTimer = 0;
  projectile = makeProjectile(BL_X + 45, BL_Y - 25);
  bodies.push(projectile);
}

function checkEnd() {
  const enemies = bodies.filter(b => b.isEnemy && b.alive);
  if (enemies.length === 0 && !levelDone) {
    levelDone = true;
    levelWon = true;
    stars = shotsLeft >= 3 ? 3 : (shotsLeft >= 1 ? 2 : 1);
    score += stars * 500;
    updateUI();
    setTimeout(showResult, 1200);
  } else if (shotsLeft <= 0 && !levelDone) {
    levelDone = true;
    levelWon = false;
    setTimeout(showResult, 1500);
  }
}

function showResult() {
  overlay.classList.remove('hidden');
  document.getElementById('overlay-title').textContent = levelWon ? '⚔️ Victory!' : '💀 Defeat!';
  document.getElementById('result-stars').textContent = levelWon ? '⭐'.repeat(stars) + '☆'.repeat(3-stars) : '💀';
  document.getElementById('result-text').textContent = `Score: ${score}`;
  document.getElementById('result-detail').textContent = levelWon ? `Shots left: ${shotsLeft}` : 'Enemies survived!';
  actionBtn.textContent = levelWon ? 'Next Level' : 'Retry';
}

actionBtn.addEventListener('click', () => {
  overlay.classList.add('hidden');
  if (levelWon) level++;
  loadLevel(level);
});

// Drawing
function drawBg() {
  const g = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  g.addColorStop(0, '#87CEEB');
  g.addColorStop(0.6, '#B0E0E6');
  g.addColorStop(1, '#d4e8d0');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, GROUND_Y);

  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  [[W*0.15,55,35],[W*0.45,80,25],[W*0.75,45,30]].forEach(([cx,cy,s]) => {
    ctx.beginPath();
    ctx.arc(cx,cy,s,0,Math.PI*2);
    ctx.arc(cx+s*0.7,cy-s*0.2,s*0.6,0,Math.PI*2);
    ctx.arc(cx+s*1.3,cy,s*0.7,0,Math.PI*2);
    ctx.fill();
  });

  // Ground
  const gg = ctx.createLinearGradient(0, GROUND_Y, 0, H);
  gg.addColorStop(0, '#5a8f3f');
  gg.addColorStop(1, '#3a5c2f');
  ctx.fillStyle = gg;
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
}

function drawBody(b) {
  if (!b.alive) return;
  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.rotate(b.angle);

  if (b.type === 'rect') {
    const hpRatio = b.hp / b.maxHp;
    const colors = { wood: '#B8860B', stone: '#808080', glass: '#87CEEB' };
    ctx.fillStyle = colors[b.mat] || '#888';
    ctx.fillRect(-b.w/2, -b.h/2, b.w, b.h);

    // Texture
    if (b.mat === 'wood') {
      ctx.strokeStyle = 'rgba(0,0,0,0.12)';
      ctx.lineWidth = 1;
      for (let i = -b.w/2+6; i < b.w/2; i += 9) {
        ctx.beginPath(); ctx.moveTo(i,-b.h/2); ctx.lineTo(i+2,b.h/2); ctx.stroke();
      }
    } else if (b.mat === 'stone') {
      ctx.strokeStyle = 'rgba(0,0,0,0.15)';
      ctx.lineWidth = 1;
      ctx.strokeRect(-b.w/2,-b.h/2,b.w,b.h);
    } else {
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = '#fff';
      ctx.fillRect(-b.w/2+3,-b.h/2+3,b.w*0.25,b.h*0.25);
      ctx.globalAlpha = 1;
    }

    // Damage cracks
    if (hpRatio < 1) {
      ctx.strokeStyle = 'rgba(0,0,0,0.5)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-b.w*0.2, -b.h*0.3);
      ctx.lineTo(b.w*0.1, 0);
      ctx.lineTo(b.w*0.15, b.h*0.25);
      ctx.stroke();
    }

    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(-b.w/2,-b.h/2,b.w,b.h);

  } else if (b.type === 'circle' && b.isEnemy) {
    // Enemy face
    ctx.fillStyle = '#cc3333';
    ctx.beginPath(); ctx.arc(0, 0, b.r, 0, Math.PI*2); ctx.fill();
    const eg = ctx.createRadialGradient(-3,-3,1,0,0,b.r);
    eg.addColorStop(0, 'rgba(255,100,100,0.4)');
    eg.addColorStop(1, 'rgba(0,0,0,0.15)');
    ctx.fillStyle = eg; ctx.fill();
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-5,-3,4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5,-3,4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(-5,-3,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5,-3,2,0,Math.PI*2); ctx.fill();
    // Eyebrows
    ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-9,-8); ctx.lineTo(-2,-6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(9,-8); ctx.lineTo(2,-6); ctx.stroke();

  } else if (b.type === 'projectile') {
    ctx.fillStyle = '#444';
    ctx.beginPath(); ctx.arc(0,0,b.r,0,Math.PI*2); ctx.fill();
    const pg = ctx.createRadialGradient(-3,-3,1,0,0,b.r);
    pg.addColorStop(0,'rgba(255,255,255,0.3)');
    pg.addColorStop(1,'rgba(0,0,0,0.15)');
    ctx.fillStyle = pg; ctx.fill();
    ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(0,0,b.r,0,Math.PI*2); ctx.stroke();
  }

  ctx.restore();
}

function drawBallista() {
  const bx = BL_X, by = BL_Y;

  // Base
  ctx.fillStyle = '#5C3317';
  ctx.fillRect(bx - 30, by - 5, 60, 12);
  ctx.fillStyle = '#4A2810';
  ctx.fillRect(bx - 35, by + 5, 70, 8);

  // Wheels
  ctx.fillStyle = '#3a2010';
  ctx.strokeStyle = '#5C3317'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(bx-22, by+12, 8, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(bx+22, by+12, 8, 0, Math.PI*2); ctx.fill(); ctx.stroke();

  // Frame
  ctx.fillStyle = '#6B3A1F';
  ctx.fillRect(bx-4, by-35, 8, 35);

  // Arms
  let armAngle = -Math.PI/4;
  if (aiming) {
    const dx = BL_X + 45 - aimX;
    const dy = (BL_Y - 25) - aimY;
    armAngle = Math.atan2(dy, dx);
    if (armAngle > -0.1) armAngle = -0.1;
    if (armAngle < -Math.PI/2) armAngle = -Math.PI/2;
  }

  ctx.save();
  ctx.translate(bx, by - 32);
  ctx.rotate(armAngle);

  // Arms
  ctx.fillStyle = '#5C3317';
  ctx.save(); ctx.rotate(-0.08);
  ctx.fillRect(0,-3.5,50,7); ctx.restore();
  ctx.save(); ctx.rotate(0.08);
  ctx.fillRect(0,-3.5,50,7); ctx.restore();

  // Bowstring
  ctx.strokeStyle = '#8B7355'; ctx.lineWidth = 2;
  ctx.beginPath();
  const sl = 45;
  ctx.moveTo(Math.cos(-0.08)*sl, Math.sin(-0.08)*sl);
  if (aiming) {
    const pull = Math.min(Math.hypot(BL_X+45-aimX, BL_Y-25-aimY), 80);
    ctx.lineTo(0, pull*0.3);
  } else {
    ctx.lineTo(0, 4);
  }
  ctx.lineTo(Math.cos(0.08)*sl, Math.sin(0.08)*sl);
  ctx.stroke();

  ctx.restore();

  // Draw loaded projectile
  if (projectile && !projectile.fired) {
    const px = bx + Math.cos(armAngle) * 42;
    const py = (by - 32) + Math.sin(armAngle) * 42;
    ctx.fillStyle = '#444';
    ctx.beginPath(); ctx.arc(px, py, projectile.r, 0, Math.PI*2); ctx.fill();
    const g = ctx.createRadialGradient(px-2,py-2,1,px,py,projectile.r);
    g.addColorStop(0,'rgba(255,255,255,0.3)');
    g.addColorStop(1,'rgba(0,0,0,0.1)');
    ctx.fillStyle = g; ctx.fill();
  }
}

function drawTrajectory() {
  if (!aiming || fired) return;
  const dx = BL_X + 45 - aimX;
  const dy = (BL_Y - 25) - aimY;
  const power = Math.min(Math.hypot(dx,dy) * 0.16, 18);
  const angle = Math.atan2(dy, dx);
  if (angle > -0.1) return;

  ctx.save();
  ctx.setLineDash([4,6]);
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  let sx = BL_X+45, sy = BL_Y-25;
  let vx = Math.cos(angle)*power, vy = Math.sin(angle)*power;
  ctx.moveTo(sx, sy);
  for (let i = 0; i < 50; i++) {
    sx += vx; sy += vy; vy += GRAVITY;
    if (sy > GROUND_Y || sx > W) break;
    ctx.lineTo(sx, sy);
  }
  ctx.stroke();
  ctx.restore();

  // Power bar
  const pwr = Math.min(Math.hypot(dx,dy)/80, 1);
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(BL_X-25, BL_Y+25, 50, 6);
  ctx.fillStyle = pwr < 0.5 ? '#4CAF50' : (pwr < 0.8 ? '#FFC107' : '#F44336');
  ctx.fillRect(BL_X-25, BL_Y+25, 50*pwr, 6);
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);
    ctx.restore();
  }
}

function updateParticles() {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.3;
    p.life -= 0.02; p.rot += 0.1;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// Input
function handleDown(x, y) {
  if (fired || levelDone) return;
  if (x < W * 0.35 && y > GROUND_Y - 120) {
    aiming = true;
    aimX = x; aimY = y;
  }
}
function handleMove(x, y) {
  if (aiming) { aimX = x; aimY = y; }
}
function handleUp() {
  if (aiming && !fired) {
    const dx = BL_X + 45 - aimX;
    const dy = (BL_Y - 25) - aimY;
    const power = Math.min(Math.hypot(dx,dy) * 0.16, 18);
    const angle = Math.atan2(dy, dx);
    if (power > 1.5 && angle < -0.1) fire(power, angle);
  }
  aiming = false;
}

canvas.addEventListener('mousedown', e => handleDown(e.clientX, e.clientY));
canvas.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
canvas.addEventListener('mouseup', handleUp);
canvas.addEventListener('touchstart', e => { e.preventDefault(); handleDown(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); handleMove(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
canvas.addEventListener('touchend', e => { e.preventDefault(); handleUp(); }, {passive:false});

// Game loop
function gameLoop() {
  if (!levelDone) {
    if (graceFrames > 0) graceFrames--;
    physicsStep();

    if (fired && projectile && !projectile.alive) {
      settleTimer++;
      if (settleTimer > 30) nextShot();
    } else if (fired && allSettled()) {
      settleTimer++;
      if (settleTimer > 50) {
        checkEnd();
        if (!levelDone) nextShot();
      }
    } else {
      settleTimer = 0;
    }
  }

  updateParticles();

  // Draw
  ctx.clearRect(0, 0, W, H);
  drawBg();
  for (const b of bodies) drawBody(b);
  drawParticles();
  drawBallista();
  drawTrajectory();

  requestAnimationFrame(gameLoop);
}

// Init
resize();
window.addEventListener('resize', resize);
score = 0; level = 1;
loadLevel(1);
gameLoop();
</script>
</body>
